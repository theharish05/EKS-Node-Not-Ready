apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-janitor
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: log-janitor
  template:
    metadata:
      labels:
        app: log-janitor
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: janitor
        image: alpine:latest
        command: ["sh", "-c"]
        args:
          - |
            while true; do
              if [ -d /var/log/containers ]; then
                find /var/log/containers/ -type l -exec readlink -f {} \; | uniq | while read logfile; do
                  if [ -f "$logfile" ]; then
                    size=$(stat -c%s "$logfile")
                    if [ $size -gt 52428800 ]; then
                      cat /dev/null > "$logfile"
                    fi
                  fi
                done
              fi
              sleep 60
            done
        volumeMounts:
        - name: log-dir
          mountPath: /var/log
      volumes:
      - name: log-dir
        hostPath:
          path: /var/log
